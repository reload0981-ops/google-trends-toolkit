<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 280px; padding: 12px; margin: 0; }
    h2 { margin: 0 0 8px 0; font-size: 15px; }
    button {
      display: block;
      width: 100%;
      min-height: 34px;
      padding: 8px;
      margin-top: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #1d6fd8;
      background: #1d6fd8;
      color: #fff;
      border-radius: 6px;
    }
    .hint { font-size: 12px; color: #5f6b7a; margin-top: 9px; line-height: 1.4; }
  </style>
</head>
<body>
  <h2>Isan Labor Trends Scraper</h2>
  <button id="open-controller">Open Controller</button>
  <div class="hint">318 jobs: TH baseline plus 5 provinces x 53 keywords.</div>
  <script src="popup.js"></script>
</body>
</html>
